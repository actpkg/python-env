[project]
name = "python-env"
version = "0.1.0"
description = "Stateful, batteries-included Python environment for AI agents"
requires-python = ">=3.14"
dependencies = [
    "act-sdk>=0.5.0",
    "cbor2>=5.9.0,<6",
]

[tool.uv.sources]
act-sdk = { path = "../../act-sdk-py" }

[dependency-groups]
dev = [
    "componentize-py>=0.24",
    "ruff>=0.15",
]
